<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download The Intelligent Network Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1C1E24;
            color: #D1D2D3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 680px;
            text-align: center;
        }
        h1 {
            font-size: 1.75rem;
            color: #FFF;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #81848A;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }
        .apps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .app-card {
            background: #2C2E36;
            border: 1px solid #3F4149;
            border-radius: 8px;
            padding: 1.5rem 1rem;
        }
        .app-card h2 {
            color: #FFF;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .app-card p {
            color: #81848A;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .download-btn {
            display: inline-block;
            background: #166DE0;
            color: #FFF;
            text-decoration: none;
            padding: 0.55rem 1.25rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin: 0.2rem;
            transition: background 0.15s;
        }
        .download-btn:hover { background: #145BC0; }
        .download-btn.secondary {
            background: transparent;
            border: 1px solid #3F4149;
            color: #D1D2D3;
        }
        .download-btn.secondary:hover { background: #3F4149; }
        .footer {
            color: #81848A;
            font-size: 0.75rem;
        }
        .footer a {
            color: #81848A;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Intelligent Network</h1>
        <p class="subtitle">Download the desktop and mobile apps. Pre-configured to connect to your TIN workspace.</p>

        <div class="apps">
            <div class="app-card">
                <h2>Desktop</h2>
                <p>Windows &middot; macOS &middot; Linux</p>
                <a class="download-btn" href="https://github.com/tindevelopers/desktop/releases/latest">Download</a>
            </div>
            <div class="app-card">
                <h2>iOS</h2>
                <p>iPhone &middot; iPad</p>
                <a class="download-btn" href="https://github.com/tindevelopers/mattermost-mobile/releases/latest">Download</a>
            </div>
            <div class="app-card">
                <h2>Android</h2>
                <p>Phones &middot; Tablets</p>
                <a class="download-btn" href="https://github.com/tindevelopers/mattermost-mobile/releases/latest">Download</a>
            </div>
        </div>

        <p class="footer">
            <a href="https://github.com/tindevelopers/desktop/releases">All desktop releases</a> &middot;
            <a href="https://github.com/tindevelopers/mattermost-mobile/releases">All mobile releases</a>
        </p>
    </div>
</body>
</html>
